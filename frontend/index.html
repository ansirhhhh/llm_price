<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI模型价格比价平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <h1 class="logo">🤖 AI模型价格比价平台</h1>
            <p class="subtitle">实时对比各大AI模型API调用价格，一键直达官方定价页面</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Status Bar -->
        <div class="status-bar" id="status-bar">
            <span class="status-left">
                数据来源: <a href="https://www.llm-prices.com/" target="_blank" rel="noopener noreferrer">llm-prices.com</a>
                &nbsp;|&nbsp;
                共 <strong id="model-count">--</strong> 个模型
            </span>
            <span class="status-right">
                数据更新: <span id="update-time">加载中...</span>
                <span id="stale-badge" class="badge badge-warning" style="display:none">使用过期缓存</span>
            </span>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-left">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="搜索模型名称或提供商..."
                        autocomplete="off"
                    >
                    <button id="search-clear" class="search-clear" title="清除搜索">&times;</button>
                </div>
                <select id="provider-filter" class="filter-select">
                    <option value="">全部提供商</option>
                </select>
                <label class="free-only-label">
                    <input type="checkbox" id="free-only">
                    仅显示免费模型
                </label>
            </div>
            <div class="toolbar-right">
                <button id="refresh-btn" class="btn btn-primary" title="刷新数据">
                    🔄 刷新
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table id="price-table">
                <thead>
                    <tr>
                        <th class="sortable" data-sort="model_id">
                            模型名称 <span class="sort-arrow"></span>
                        </th>
                        <th class="sortable" data-sort="provider">
                            提供商 <span class="sort-arrow"></span>
                        </th>
                        <th class="sortable col-price" data-sort="input_price">
                            输入价格 ($/1M tokens) <span class="sort-arrow"></span>
                        </th>
                        <th class="sortable col-price" data-sort="output_price">
                            输出价格 ($/1M tokens) <span class="sort-arrow"></span>
                        </th>
                        <th class="sortable col-context" data-sort="context_window">
                            上下文窗口 <span class="sort-arrow"></span>
                        </th>
                        <th class="col-action">操作</th>
                    </tr>
                </thead>
                <tbody id="price-table-body">
                    <!-- Rows rendered by JS -->
                </tbody>
            </table>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display:none">
            <div class="empty-icon">📭</div>
            <h3>没有找到匹配的模型</h3>
            <p>请尝试调整搜索条件或筛选器</p>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-state">
            <div class="spinner"></div>
            <p>正在加载价格数据...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="empty-state" style="display:none">
            <div class="empty-icon">⚠️</div>
            <h3 id="error-msg">加载失败</h3>
            <p>请检查网络连接后重试</p>
            <button class="btn btn-primary" onclick="fetchPrices()">🔄 重新加载</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>
            价格数据来源于 <a href="https://www.llm-prices.com/" target="_blank" rel="noopener noreferrer">llm-prices.com</a>，
            仅供参考，实际价格以各平台官网为准。
        </p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
